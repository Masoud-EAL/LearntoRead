<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Head (partially shown at top) -->
  <ellipse cx="50" cy="18" rx="22" ry="18" fill="#f5c5a3"/>
  <!-- Neck column -->
  <rect x="38" y="30" width="24" height="30" rx="4" fill="#f0b48e"/>
  <!-- Neck shading sides -->
  <rect x="38" y="30" width="6" height="30" rx="3" fill="#e8a882" opacity="0.5"/>
  <rect x="56" y="30" width="6" height="30" rx="3" fill="#e8a882" opacity="0.5"/>
  <!-- Collarbone / shoulders -->
  <path d="M10,60 Q30,56 38,60 Q50,64 62,60 Q70,56 90,60" stroke="#e8a882" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Shoulder area -->
  <ellipse cx="50" cy="64" rx="40" ry="10" fill="#f5c5a3"/>
  <!-- Throat line (subtle) -->
  <line x1="50" y1="33" x2="50" y2="57" stroke="#e09070" stroke-width="1.5" opacity="0.4"/>
</svg>
